<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>{% block title %}50 States Playbook{% endblock %}</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Inter:wght@400;500;600&display=swap" rel="stylesheet" />

  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --orange:      #F97316;
      --orange-dim:  #FED7AA;
      --orange-bg:   #FFF7ED;
      --black:       #1A1A1A;
      --gray:        #6B7280;
      --white:       #FFFFFF;

      --font-display: 'Bebas Neue', sans-serif;
      --font-body:    'Inter', sans-serif;
    }

    body {
      font-family: var(--font-body);
      background: var(--white);
      color: var(--black);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    /* ── NAV ── */
    nav {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 1.25rem 2.5rem;
      border-bottom: 1px solid #F3F4F6;
    }

    .nav-logo {
      font-family: var(--font-display);
      font-size: 1.4rem;
      letter-spacing: 0.08em;
      color: var(--black);
    }

    .nav-logo span { color: var(--orange); }

    .btn {
      font-family: var(--font-body);
      font-weight: 600;
      border: none;
      cursor: pointer;
      transition: background 0.2s;
    }

    .btn-pill {
      background: var(--orange);
      color: var(--white);
      font-size: 0.78rem;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      padding: 0.45rem 1.1rem;
      border-radius: 999px;
      text-decoration: none;
      display: inline-block;
    }

    .btn-pill:hover { background: #EA6A0A; }
    .nav-actions {
      display: flex;
      align-items: center;
      gap: 0.75rem;
    }
    /* ── FOOTER ── */
    footer {
      background: var(--orange-bg);
      border-top: 1px solid var(--orange-dim);
      text-align: center;
      padding: 1.1rem 1.5rem;
      font-size: 0.8rem;
      color: var(--gray);
      letter-spacing: 0.03em;
    }

    footer span { color: var(--orange); font-weight: 600; }

    @media (prefers-reduced-motion: reduce) {
      * { transition: none !important; }
    }

    @media (max-width: 480px) {
      nav { padding: 1rem 1.25rem; }
    }
  </style>

  {% block extra_styles %}{% endblock %}
</head>
<body>

  <nav>
    <div class="nav-logo">50 States <span>Playbook</span></div>
    <div class="nav-actions">
      <a href="{{ url_for('news.all_news') }}" class="btn btn-pill">View Data →</a>
      <a href="{{ url_for('news.all_news') }}" class="btn btn-pill">News</a>
    </div>
  </nav>

  {% block content %}{% endblock %}

  <!-- later add link to eil website attached to footer -->
  <footer>
    Made by <span>the Electoral Innovation Lab</span> &nbsp;·&nbsp; 50 States Playbook
  </footer>

</body>
</html>
