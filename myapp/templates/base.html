<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>{% block title %}50 States Playbook{% endblock %}</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Archivo:wght@400;600;700;800&family=Bebas+Neue&family=Inter:wght@400;500;600&family=Spline+Sans+Mono:wght@400;500;600;700&display=swap" rel="stylesheet">

  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --orange:      #F97316;
      --orange-deep: #cb3918;
      --orange-dim:  #FED7AA;
      --orange-bg:   #FFF7ED;
      --black:       #1A1A1A;
      --gray:        #6B7280;
      --white:       #FFFFFF;

      --font-display: 'Bebas Neue', sans-serif;
      --font-body:    'Inter', sans-serif;
    }

    body {
      font-family: var(--font-body);
      background: var(--orange-bg);
      color: var(--black);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    .wrap {
      max-width:var(--maxw);
      margin:0 auto;
      padding:0 24px
    }

    .about-grid{
      grid-template-columns:1fr
    }

    /* ── HERO ── */
.hero {
  position: relative;
  padding: 40px 0 30px;
  overflow: hidden;
}

.hero-center {
  position: absolute;
  inset: 0;
  display: grid;
  place-content: center;
  text-align: center;
  pointer-events: none;
  font-family: 'Archivo';
  font-weight: 800;
  font-size: 7px;
  line-height: 1.05;
  text-transform: uppercase;
  letter-spacing: 0.02em;
  z-index: 5;
}

.page-content {
  padding: 1cm;
  width: 100%;
}

.sticker small {
  display: block;
  font-size: 6.5px;
  opacity: 0.7;
  font-weight: 600;
}

.sticker:hover {
  transform: translate(-50%, -50%) rotate(var(--rot)) scale(1.25);
  filter: brightness(1.08);
  z-index: 10;
}

@keyframes pop {
  from {
    opacity: 0;
    transform: translate(-50%, -50%) scale(0.4) rotate(var(--rot));
  }
}

.eyebrow {
  font-family: 'Archivo';
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: 0.22em;
  font-size: 18px;
  color: var(--orange);
  margin-bottom: 20px;
}

.hero-title {
  font-size: clamp(40px, 8vw, 75px);
  line-height: 0.98;
  font-weight: 600;
  letter-spacing: -0.02em;
  margin: 0;
}

.hero-title em {
  font-style: italic;
  color: var(--orange);
}

.counters {
  display: flex;
  gap: 35px;
  justify-content: center;
  margin-top: 30px;
  pointer-events: auto;
}

.counter .num {
  font-family: 'Archivo';
  font-weight: 800;
  font-size: 30px;
  line-height: 1;
  letter-spacing: -0.02em;
}

.counter .lbl {
  font-family: 'Spline Sans Mono';
  font-size: 13px;
  text-transform: uppercase;
  letter-spacing: 0.1em;
  color: var(--orange);
  margin-top: 5px;
}

.hero-sub {
  font-family: 'Archivo';
  max-width: 800px;
  margin: 100px auto 0;
  text-align: center;
  color: var(--black);
  font-size: 30px;
}

.scrollcue {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 6px;
  margin-top: 30px;
  font-family: 'Spline Sans Mono';
  font-size: 17px;
  letter-spacing: 0.14em;
  color: var(--orange-deep);
  text-transform: uppercase;
}

.scrollcue .arr {
  width: 1px;
  height: 26px;
  background: var(--line);
  position: relative;
}

.scrollcue .arr::after {
  content: "";
  position: absolute;
  left: -3px;
  bottom: 0;
  width: 7px;
  height: 7px;
  border-right: 1px solid var(--line);
  border-bottom: 1px solid var(--line);
  transform: rotate(45deg);
}

.sticker-map {
  position: relative;
  width: min(1300px, 96vw);
  aspect-ratio: 2.05 / 1;
  margin: 0 auto;
}

.sticker {
  position: absolute;
  width: clamp(40px, 5.2vw, 62px);
  height: clamp(40px, 5.2vw, 62px);
  border-radius: 50%;
  display: grid;
  place-items: center;
  text-align: center;
  font-family: 'Archivo';
  font-weight: 800;
  font-size: clamp(6px, 0.78vw, 9.5px);
  line-height: 1.05;
  text-transform: uppercase;
  letter-spacing: 0.02em;
  border: 1.5px solid currentColor;
  background: var(--white);
  color: var(--orange);
  opacity: 0.3;
  transform: translate(-50%, -50%) rotate(var(--rot));
  box-shadow: 0 4px 10px -6px rgba(16, 35, 63, 0.35);
  animation: pop 0.5s backwards;
  cursor: pointer;
  transition: transform 0.18s ease, opacity 0.18s ease, filter 0.18s ease, box-shadow 0.18s ease;
  z-index: 1;
  overflow: hidden;
}

#stickerMapOutline {
  position: absolute;
  inset: 0;
  z-index: 0;
  pointer-events: none;
}

.sticker-outline {
  width: 100%;
  height: 100%;
  display: block;
}

.sticker-outline path {
  fill: var(--orange-dim);
  stroke: none;
  opacity: 0.2;
}

.sticker:hover {
  transform: translate(-50%, -50%) rotate(var(--rot)) scale(1.18);
  opacity: 1;
  filter: brightness(1.08);
  z-index: 20;
  box-shadow: 0 10px 22px -8px rgba(16, 35, 63, 0.45);
}

.sticker img {
  width: 100%;
  height: 100%;
  object-fit: cover;
  border-radius: 50%;
  display: block;
}

    /* ── NAV ── */
    nav {
      position: sticky; 
      top: 0;
      z-index: 1000;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0.8rem 2.5rem;
      background: var(--orange-bg);
      border-bottom: 1px solid #F3F4F6;
      
    }

    .nav-logo {
      font-family: var(--font-display);
      font-size: 1.4rem;
      letter-spacing: 0.08em;
      color: var(--black);
    }

    .nav-logo span { color: var(--orange); }

    .btn {
      font-family: var(--font-body);
      font-weight: 600;
      border: none;
      cursor: pointer;
      transition: background 0.2s;
    }

    .btn-pill {
      background: var(--orange);
      color: var(--white);
      font-size: 0.78rem;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      padding: 0.45rem 1.1rem;
      border-radius: 999px;
      text-decoration: none;
      display: inline-block;
    }

    .btn-pill:hover { background: #EA6A0A; }
    .nav-actions {
      display: flex;
      align-items: center;
      gap: 0.75rem;
    }

  /* ---------- SECTION SHELL ---------- */
.section {
  padding: 64px 0;
  border-top: 1px solid var(--line);
}

.sec-head {
  display: flex;
  align-items: flex-end;
  justify-content: space-between;
  gap: 20px;
  margin-bottom: 26px;
  flex-wrap: wrap;
}

.sec-kick {
  font-family: 'Spline Sans Mono';
  font-size: 11px;
  letter-spacing: 0.18em;
  text-transform: uppercase;
  color: var(--orange);
  margin-bottom: 6px;
}

.sec-title {
  font-size: clamp(26px, 3.6vw, 38px);
  font-weight: 600;
  letter-spacing: -0.02em;
  margin: 0;
}

.sec-lead {
  max-width: 520px;
  color: var(--ink-soft);
  font-size: 16px;
}

    /* ── MAP ── */
  .map-box {
    background: var(--orange-bg);
    border: 1px solid var(--orange-dim);
    border-radius: 10px;
    padding: 10px;
    overflow: hidden;
  }

  svg.usmap {
    width: 100%;
    height: auto;
    display: block;
  }

  svg.usmap path {
    stroke: #ffffff;
    stroke-width: 0.8;
    cursor: pointer;
    transition: transform 0.2s, filter 0.2s, opacity 0.2s;
    transform-box: fill-box;
    transform-origin: center;
  }

  svg.usmap path:hover {
    filter: brightness(1.12);
    transform: scale(1.04);
  }

  svg.usmap path:focus {
    outline: none;
  }

  svg.usmap path:focus-visible {
    outline: 2px solid var(--orange);
    outline-offset: 2px;
  }

  .maptip {
    position: fixed;
    z-index: 100;
    pointer-events: none;
    opacity: 0;
    transition: opacity 0.12s;
    background: var(--black);
    color: white;
    border-radius: 10px;
    padding: 10px 13px;
    max-width: 240px;
    transform: translate(-50%, -120%);
    font-size: 0.85rem;
  }

  .maptip h4 {
    margin: 0 0 4px;
    font-size: 0.9rem;
  }

  .maptip p {
    margin: 0;
    font-size: 0.8rem;
    line-height: 1.4;
  }

  .legend {
    display: flex;
    align-items: center;
    gap: 14px;
    flex-wrap: wrap;
    margin-top: 14px;
    font-size: 0.8rem;
    color: var(--gray);
  }

  .legend .scale {
    display: flex;
    height: 11px;
    width: 200px;
    border-radius: 999px;
    overflow: hidden;
    border: 1px solid var(--orange-dim);
  }

  .legend .scale i {
    flex: 1;
  }

  /* ---------- TABLE ---------- */
  .table-controls {
  display: flex;
  gap: 12px;
  flex-wrap: wrap;
  margin-bottom: 14px;
  align-items: center;
}

.search {
  flex: 1;
  min-width: 200px;
  display: flex;
  align-items: center;
  gap: 8px;
  background: #fff;
  border: 1px solid var(--orange);
  border-radius: 10px;
  padding: 9px 13px;
}

.search input {
  border: 0;
  outline: 0;
  background: none;
  font-family: 'Archivo';
  font-size: 15px;
  width: 100%;
  color: var(--orange);
}

.search svg {
  flex: none;
  opacity: 0.5;
}

.tbl-wrap {
  border: 1px solid var(--orange);
  border-radius: 14px;
  overflow: hidden;
  box-shadow: var(--orange);
  background: #fff;
}

table {
  width: 100%;
  border-collapse: collapse;
  font-family: 'Archivo';
}

thead th {
  background: var(--orange);
  color: #ffffff;
  text-align: left;
  font-size: 11px;
  text-transform: uppercase;
  letter-spacing: 0.08em;
  font-weight: 600;
  padding: 13px 16px;
  cursor: pointer;
  user-select: none;
  white-space: nowrap;
}

thead th:hover {
  background: var(--orange-deep);
}

thead th .ar {
  opacity: 0.45;
  font-size: 9px;
  margin-left: 5px;
}

tbody td {
  padding: 13px 16px;
  border-top: 1px solid var(--paper-2);
  font-size: 15px;
  vertical-align: middle;
}

tbody tr:hover {
  background: #fbf9f3;
}

.statelink {
  font-weight: 600;
  color: var(--orange);
  text-decoration: none;
  border-bottom: 1.5px solid transparent;
  cursor: pointer;
}

.statelink:hover {
  border-color: var(--orange);
  color: var(--orange);
}

.gpill2 {
  font-family: 'Spline Sans Mono';
  font-weight: 600;
  font-size: 12.5px;
  padding: 2px 9px;
  border-radius: 7px;
  display: inline-block;
  min-width: 34px;
  text-align: center;
}

.bar-cell {
  display: flex;
  align-items: center;
  gap: 10px;
}

.bar-track {
  flex: 1;
  height: 7px;
  background: var(--paper-2);
  border-radius: 4px;
  overflow: hidden;
  min-width: 80px;
}

.bar-fill {
  height: 100%;
  border-radius: 4px;
}

.reform-tags {
  display: flex;
  gap: 5px;
  flex-wrap: wrap;
}

.tag {
  font-family: 'Spline Sans Mono';
  font-size: 10px;
  padding: 2px 7px;
  border-radius: 6px;
  background: var(--paper-2);
  color: var(--ink-soft);
  white-space: nowrap;
}

.headline-link {
  color: #000000;
  text-decoration: none;
  transition: color 0.2s ease, text-decoration-color 0.2s ease;
}

.headline-link:hover {
  text-decoration: underline;
}


/* ── FOOTER ── */
    footer {
      background: var(--orange-bg);
      border-top: 1px solid var(--orange-dim);
      text-align: center;
      padding: 1.1rem 1.5rem;
      font-size: 0.8rem;
      color: var(--gray);
      letter-spacing: 0.03em;
    }

    footer span { color: var(--orange); font-weight: 600; }

    @media (prefers-reduced-motion: reduce) {
      * { transition: none !important; }
    }

    @media (max-width: 480px) {
      nav { padding: 1rem 1.25rem; }
    }

   /* ---------- ABOUT ---------- */
  .about-grid {
    display:grid;
    grid-template-columns:1.3fr 1fr;
    gap:100px;
    align-items:start
  }

  .about-grid p {
    font-size:18px;
    color:var(--black)
  }

  .about-grid p strong {
    color:var(--black)
  }

  .about-card {
    background:var(--orange-bg);
    color:var(--black);
    border-radius:16px;
    padding:26px;
    box-shadow:var(--orange-dim)
  }

  .about-card h4 {
    font-family:'Archivo';
    font-weight:700;
    font-size:13px;
    text-transform:uppercase;
    letter-spacing:.1em;
    margin:0 0 14px;
    color:var(--orange)
  }

  .about-card ul {
    margin:0;
    padding:0;
    list-style:none
  }

  .about-card li {
    padding:9px 0;
    border-top:1px solid rgba(255,255,255,.12);
    font-size:15px;
    font-family:'Archivo';
    display:flex;
    gap:10px
  }

  .about-card li span { 
    color:var(--orange);
    font-family:'Spline Sans Mono';
    font-size:12px
  }

/* ---------- LINKS ---------- */
  a {
  color: inherit; 
  text-decoration: none;
}
  </style>

  {% block extra_styles %}{% endblock %}
</head>
<body>

  <nav>
    <div class="nav-logo"> <a href="{{ url_for('index.index') }}">50 States <span>Playbook</span></a></div>
    <div class="nav-actions">
      <a href="{{ url_for('about.get_about') }}" class="btn btn-pill">About</a>
      <a href="{{ url_for('index.index') }}#map" class="btn btn-pill">Map</a>
      <a href="{{ url_for('index.index') }}#table" class="btn btn-pill">Table</a>
      <a href="{{ url_for('news.all_news') }}" class="btn btn-pill">News</a>
      <a href="{{ url_for('news.all_news') }}" class="btn btn-pill">View Data →</a>
    </div>
  </nav>
  
  <main class="page-content">
    {% block content %}{% endblock %}
  </main>

  <footer>
  Made by the
  <a href="https://www.electoral-lab.org/" target="_blank" rel="noopener noreferrer">
    <span> Electoral Innovation Lab</span>
  </a>
  &nbsp;·&nbsp; 50 States Playbook
</footer>
{% block extra_scripts %}{% endblock %}
</body>
</html>
